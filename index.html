<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loggia - インターネットの居間と今</title>
    <link class="w-full" rel="icon" href="logo.jpg" type="image/jpeg">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <style>
        body { background-color: #15202b; color: #fff; }
        .twitter-border { border-color: #38444d; }
        .brand-color-bg { background-color: #5999FF; }
        .brand-color-text { color: #5999FF; }
        .twitter-hover:hover { background-color: #192734; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #192734; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #38444d; border-radius: 3px; }
    </style>
</head>
<body class="font-sans antialiased overflow-x-hidden">

    <div id="modal-container" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-200">
        <div class="bg-[#192734] border twitter-border p-6 rounded-2xl w-full max-w-lg shadow-2xl relative mx-4">
            <button onclick="closeCustomModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white text-lg"><i class="fas fa-times"></i></button>
            <div id="modal-content-area"></div>
        </div>
    </div>

    <div id="block-gate" class="fixed inset-0 bg-[#15202b] z-50 flex items-center justify-center hidden">
        <div class="bg-[#192734] border twitter-border p-8 rounded-2xl w-full max-w-md text-center space-y-6 shadow-2xl mx-4">
            <div id="block-icon-area" class="text-5xl"></div>
            <h2 id="block-title" class="text-2xl font-bold"></h2>
            <p id="block-desc" class="text-gray-400 text-sm"></p>
            <div id="block-action-area" class="pt-4"></div>
        </div>
    </div>

    <div id="auth-gate" class="fixed inset-0 bg-[#15202b] z-40 flex items-center justify-center hidden">
        <div class="bg-[#192734] border border-[#38444d] p-8 rounded-2xl w-full max-w-md space-y-6 shadow-2xl mx-4">
            <div class="flex flex-col items-center space-y-3">
                <img src="logo.jpg" alt="Loggia Logo" class="w-16 h-16 object-cover shadow bg-black">
                <div class="text-2xl font-light tracking-widest text-gray-200">Loggia</div>
            </div>
            
            <div class="flex border-b twitter-border text-center">
                <button onclick="toggleAuthTab('login')" id="btn-tab-login" class="w-1/2 pb-2 font-bold border-b-2 brand-color-text !border-[#5999FF]">ログイン</button>
                <button onclick="toggleAuthTab('register')" id="btn-tab-register" class="w-1/2 pb-2 font-bold text-gray-400 border-b-2 border-transparent">入居申し込み</button>
            </div>

            <div id="form-login" class="space-y-4">
                <input type="email" id="login-email" placeholder="メールアドレス" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none focus:border-[#5999FF]">
                <input type="password" id="login-password" placeholder="パスワード" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none focus:border-[#5999FF]">
                
                <div id="recaptcha-login" class="g-recaptcha" data-sitekey="6Lc2tzktAAAAAP_Gzbq8XnwNnApovLshBlubNJC_" data-callback="onLoginCaptchaSuccess" data-size="invisible"></div>
                
                <button id="btn-login-submit" onclick="triggerLoginWithCaptcha()" class="w-full brand-color-bg text-white font-bold py-3 rounded-full hover:opacity-90 cursor-pointer flex justify-center items-center">
                    <span id="btn-login-text">居間に入る</span>
                </button>
            </div>

            <div id="form-register" class="space-y-4 hidden h-[320px] overflow-y-auto pr-1 custom-scroll">
                <input type="email" id="reg-email" placeholder="メールアドレス (必須)" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none">
                <input type="password" id="reg-password" placeholder="パスワード (必須)" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none">
                <input type="password" id="reg-password-confirm" placeholder="パスワードの確認 (必須)" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none">
                <div>
                    <label class="text-xs text-gray-400 block mb-1">誕生日 (必須)</label>
                    <input type="date" id="reg-birth" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none text-gray-400">
                </div>
                <input type="text" id="reg-username" placeholder="住人ID (英数字・必須)" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none">
                <input type="text" id="reg-display" placeholder="表札の名前" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none">
                
                <div class="bg-[#15202b] p-3 rounded border twitter-border space-y-3">
                    <label class="text-xs text-gray-400 block">アイコン画像（任意）</label>
                    <input type="file" id="reg-icon-file" accept="image/*" onchange="previewImage(this, 'reg-preview')" class="block w-full text-xs text-gray-400">
                    <img id="reg-preview" src="logo.jpg" class="w-12 h-12 rounded-full object-cover hidden">
                </div>

                <div id="recaptcha-reg" class="g-recaptcha" data-sitekey="6Lc2tzktAAAAAP_Gzbq8XnwNnApovLshBlubNJC_" data-callback="onRegisterCaptchaSuccess" data-size="invisible"></div>

                <button id="btn-reg-submit" onclick="triggerRegisterWithCaptcha()" class="w-full brand-color-bg text-white font-bold py-3 rounded-full hover:opacity-90 cursor-pointer flex justify-center items-center">
                    <span id="btn-reg-text">入居を確定する</span>
                </button>
            </div>
        </div>
    </div>

    <div class="w-full min-h-screen grid grid-cols-1 md:grid-cols-[260px_1fr] lg:grid-cols-[290px_768px_1fr] gap-0">
        
        <header class="border-r border-[#38444d] p-4 flex flex-col justify-between h-screen sticky top-0 hidden md:flex z-30 bg-[#15202b]">
            <div class="space-y-6 text-xl font-bold">
                <div onclick="navigateToPage('timeline')" class="flex items-center space-x-3 p-2 cursor-pointer">
                    <img src="logo.jpg" alt="Loggia" class="w-10 h-10 object-cover shadow bg-black">
                    <div class="text-lg font-light tracking-widest text-gray-300">Loggia</div>
                </div>
                <nav class="space-y-2 text-[16px]">
                    <button onclick="navigateToPage('timeline')" class="w-full text-left p-3 rounded-full hover:bg-[#192734] cursor-pointer flex items-center"><i class="fas fa-couch w-8 text-center mr-2 text-gray-400"></i>居間</button>
                    <button onclick="navigateToPage('profile', currentUser?.username)" class="w-full text-left p-3 rounded-full hover:bg-[#192734] cursor-pointer flex items-center"><i class="fas fa-user w-8 text-center mr-2 text-gray-400"></i>自分の部屋</button>
                    <button onclick="navigateToPage('settings')" class="w-full text-left p-3 rounded-full hover:bg-[#192734] cursor-pointer flex items-center"><i class="fas fa-door-open w-8 text-center mr-2 text-gray-400"></i>模様替え・設定</button>
                    
                    <button id="nav-admin-btn" onclick="navigateToPage('admin')" class="w-full text-left p-3 rounded-full text-amber-400 hover:bg-[#192734] cursor-pointer flex items-center hidden">
                        <i class="fas fa-tools w-8 text-center mr-2 text-amber-400"></i>管理室
                    </button>

                    <button onclick="handleLogout()" class="w-full text-left p-3 rounded-full text-red-400/80 hover:bg-[#192734] cursor-pointer flex items-center"><i class="fas fa-sign-out-alt w-8 text-center mr-2"></i>退出</button>
                </nav>
            </div>
            
            <div class="flex items-center space-x-2 p-2 border border-[#38444d] mt-auto rounded-full bg-[#192734]/20 text-sm">
                <div id="nav-avatar-container" class="w-8 h-8 flex-shrink-0"></div>
                <div class="overflow-hidden">
                    <div id="nav-display-name" class="font-bold truncate">ゲスト</div>
                    <div id="nav-username" class="text-gray-400 text-xs truncate">@guest</div>
                </div>
            </div>
        </header>

        <main class="border-r border-l md:border-l-0 twitter-border min-h-screen pb-20 md:pb-0 bg-[#15202b] w-full">
            
            <section id="tab-timeline" class="block">
                <div class="sticky top-0 bg-[#15202b]/80 backdrop-blur border-b twitter-border p-4 font-bold text-xl flex justify-between items-center z-10">
                    <div class="flex items-center space-x-3">
                        <button id="profile-back-btn" onclick="exitProfileMode()" class="mr-2 text-gray-400 hover:text-white hidden"><i class="fas fa-arrow-left"></i></button>
                        <span id="timeline-header-title">Loggia の「今」</span>
                        <span id="sync-status" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-500/10 text-green-400 border border-green-500/20 animate-pulse">
                          <span id="sync-dot" class="w-1.5 h-1.5 mr-1.5 bg-green-400 rounded-full"></span><span id="sync-text">自動同期中</span>
                        </span>
                    </div>
                </div>

            <section id="view-timeline" class="block">
                <div id="profile-card-area" class="border-b border-[#38444d] bg-[#192734]/20 hidden p-6 space-y-4">
                    <div class="flex items-start justify-between">
                        <div id="prof-card-avatar" class="w-20 h-20"></div>
                        <span id="prof-card-badge" class="px-3 py-1 rounded-full text-xs font-bold"></span>
                    </div>
                    <div>
                        <h2 id="prof-card-display" class="text-2xl font-bold text-white"></h2>
                        <p id="prof-card-username" class="text-gray-400 text-sm"></p>
                    </div>
                    <p id="prof-card-bio" class="text-gray-200 text-base whitespace-pre-wrap"></p>
                </div>
                
                <div id="timeline-post-box" class="border-b border-[#38444d] p-4 flex space-x-3 bg-[#192734]/10">
                    <div id="form-avatar-container" class="w-12 h-12 flex-shrink-0"></div>
                    <div class="flex-1">
                        <textarea id="post-message" placeholder="いまどうしてる？" class="w-full bg-transparent text-xl outline-none resize-none h-24 pt-1" maxlength="140"></textarea>
                        <div class="flex justify-between items-center pt-2 border-t border-[#38444d] mt-2">
                            <span class="text-sm text-gray-500" id="char-count">0 / 140</span>
                            <button id="btn-post-submit" onclick="submitPost()" class="brand-color-bg text-white font-bold px-5 py-2 rounded-full cursor-pointer hover:opacity-90 flex items-center">
                                <span id="btn-post-text">届け！</span>
                            </button>
                        </div>
                    </div>
                </div>
                
                <div id="timeline-loading" class="p-8 text-center text-gray-400"><i class="fas fa-spinner animate-spin mr-2"></i>居間をのぞき中...</div>
                <div id="timeline-posts" class="divide-y border-[#38444d]"></div>
            </section>

            <section id="view-settings" class="hidden p-6 space-y-8">
                <div>
                    <div class="font-bold text-xl mb-6 border-b border-[#38444d] pb-2">自室の模様替え</div>
                    <div class="space-y-5 max-w-md">
                        <div>
                            <label class="block text-gray-400 text-sm mb-1">表札の名前</label>
                            <input type="text" id="edit-display-name" class="w-full bg-[#192734] border twitter-border p-2.5 rounded outline-none focus:border-[#5999FF]">
                        </div>
                        <div class="bg-[#192734]/40 p-4 rounded-xl border twitter-border space-y-3">
                            <label class="block text-gray-400 text-sm">アイコン画像</label>
                            <div class="flex items-center space-x-4">
                                <input type="file" id="edit-icon-file" accept="image/*" onchange="previewImage(this, 'edit-preview')" class="block w-full text-xs text-gray-400">
                                <img id="edit-preview" src="" class="w-14 h-14 rounded-full object-cover border twitter-border hidden">
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm mb-1">自己紹介</label>
                            <textarea id="edit-bio" class="w-full bg-[#192734] border twitter-border p-2.5 rounded outline-none h-24 resize-none focus:border-[#5999FF]"></textarea>
                        </div>
                        <button onclick="saveProfile()" class="bg-[#5999FF] text-white font-bold px-6 py-2.5 rounded-full cursor-pointer hover:opacity-90">保存する</button>
                    </div>
                </div>

                <div class="pt-6 border-t border-red-900/40">
                    <div class="font-bold text-xl text-red-400 mb-2">危機管理・アカウント設定</div>
                    <p class="text-gray-400 text-xs mb-4">Loggiaからの一時離脱、または全データの抹消を自分自身の意志で行えます。</p>
                    <div class="flex flex-wrap gap-4">
                        <button onclick="openStopConfirmModal()" class="bg-amber-600/20 text-amber-400 border border-amber-500/30 font-bold px-4 py-2.5 rounded-xl hover:bg-amber-600/40 cursor-pointer text-sm">
                            <i class="fas fa-moon mr-2"></i>アカウントを一時停止(Stop)
                        </button>
                        <button onclick="openDeleteConfirmModal()" class="bg-red-600/20 text-red-400 border border-red-500/30 font-bold px-4 py-2.5 rounded-xl hover:bg-red-600/40 cursor-pointer text-sm">
                            <i class="fas fa-trash-alt mr-2"></i>全データを完全削除(Delete)
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 bg-[#15202b]/95 backdrop-blur border-t border-[#38444d] flex justify-around p-3 md:hidden z-20 shadow-lg">
        <button onclick="switchTab('timeline')" class="text-2xl text-gray-400 focus:text-white px-4 py-1"><i class="fas fa-couch"></i></button>
        <button onclick="openMyRoomProfile()" class="text-2xl text-gray-400 focus:text-white px-4 py-1"><i class="fas fa-user"></i></button>
        <button onclick="switchTab('profile-edit')" class="text-2xl text-gray-400 focus:text-white px-4 py-1"><i class="fas fa-door-open"></i></button>
    </footer>

    <script>
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyCnsVLKorpz98tD-aycq2aodvafbMpCtjql-mGcFmi1HOA36cC8S3RAkZEqthbVbxk/exec';

        let currentUser = null;
        let autoRefreshInterval = null;
        let currentMaintenanceState = false; 

        window.onload = function() {
            const cached = localStorage.getItem('loggia_user');
            if (cached) {
                currentUser = JSON.parse(cached);
                updateUserUI();
                loadTimeline(false);
                startAutoRefresh();
            } else {
                document.getElementById('auth-gate').classList.remove('hidden');
            }
            document.getElementById('post-message').oninput = function() {
                document.getElementById('char-count').innerText = this.value.length + " / 140";
            };
        };

        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(() => {
                if (!document.getElementById('tab-timeline').classList.contains('hidden')) {
                    loadTimeline(true);
                }
            }, 10000);
        }

        function setSyncStatus(isOnline) {
            const statusEl = document.getElementById('sync-status');
            const dotEl = document.getElementById('sync-dot');
            const textEl = document.getElementById('sync-text');
            if (isOnline) {
                statusEl.className = "inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-500/10 text-green-400 border border-green-500/20";
                dotEl.className = "w-1.5 h-1.5 mr-1.5 bg-green-400 rounded-full";
                textEl.innerText = "自動同期中";
            } else {
                statusEl.className = "inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-500/10 text-red-400 border border-red-500/20";
                dotEl.className = "w-1.5 h-1.5 mr-1.5 bg-red-400 rounded-full";
                textEl.innerText = "同期不可";
            }
        }

        function openCustomModal(htmlContent) {
            const container = document.getElementById('modal-container');
            document.getElementById('modal-content-area').innerHTML = htmlContent;
            container.classList.remove('hidden');
            setTimeout(() => container.classList.add('opacity-100'), 10);
        }
        function closeCustomModal() {
            const container = document.getElementById('modal-container');
            container.classList.remove('opacity-100');
            setTimeout(() => { container.classList.add('hidden'); }, 200);
        }

        function loadTimeline(isAutoRefresh = false) {
            if (!currentUser) return;
            if (!isAutoRefresh) document.getElementById('timeline-loading').classList.remove('hidden');
            let url = `${GAS_API_URL}?action=getTimeline&username=${currentUser.username}&isAutoRefresh=${isAutoRefresh}`;
            if (selectedProfileUser) url += `&targetUser=${selectedProfileUser}`;

            fetch(url)
            .then(res => res.json())
            .then(res => {
                if (!isAutoRefresh) document.getElementById('timeline-loading').classList.add('hidden');
                if (res.success) { setSyncStatus(true); renderTimeline(res.data); } 
                else { setSyncStatus(false); }
            })
            .catch(() => {
                if (!isAutoRefresh) document.getElementById('timeline-loading').classList.add('hidden');
                setSyncStatus(false);
            });
        }

        function viewUserProfile(username) {
            selectedProfileUser = username;
            document.getElementById('timeline-posts').innerHTML = '';
            document.getElementById('timeline-post-box').classList.add('hidden');
            document.getElementById('profile-back-btn').classList.remove('hidden');
            
            fetch(`${GAS_API_URL}?action=getUserProfile&targetUser=${username}`)
            .then(res => res.json())
            .then(res => {
                if (res.success) {
                    const u = res.user;
                    document.getElementById('timeline-header-title').innerText = `${u.display_name} の部屋`;
                    document.getElementById('prof-card-avatar').innerHTML = getAvatarHtml(u.icon_url, "w-20 h-20 rounded-full object-cover border-2 border-zinc-700");
                    document.getElementById('prof-card-display').innerText = u.display_name;
                    document.getElementById('prof-card-username').innerText = `@${u.username}`;
                    document.getElementById('prof-card-bio').innerText = u.bio || 'まだ自己紹介が書かれていません。';
                    
                    const badge = document.getElementById('prof-card-badge');
                    if (u.status === 'Ban') { badge.className = "px-3 py-1 rounded-full text-xs font-bold bg-red-500/20 text-red-400 border border-red-500/30"; badge.innerText = "BAN"; }
                    else if (u.status === 'Stop') { badge.className = "px-3 py-1 rounded-full text-xs font-bold bg-amber-500/20 text-amber-400 border border-amber-500/30"; badge.innerText = "休眠中"; }
                    else { badge.className = "px-3 py-1 rounded-full text-xs font-bold bg-green-500/20 text-green-400 border border-green-500/20"; badge.innerText = "在住"; }
                    
                    document.getElementById('profile-card-area').classList.remove('hidden');
                    loadTimeline(false);
                }
            });
        }

        function openMyRoomProfile() { switchTab('timeline'); viewUserProfile(currentUser.username); }
        function exitProfileMode() {
            selectedProfileUser = null;
            document.getElementById('profile-card-area').classList.add('hidden');
            document.getElementById('profile-back-btn').classList.add('hidden');
            document.getElementById('timeline-post-box').classList.remove('hidden');
            document.getElementById('timeline-header-title').innerText = "Loggia の「今」";
            loadTimeline(false);
        }

        function renderTimeline(posts) {
            const container = document.getElementById('timeline-posts');
            container.innerHTML = '';
            if (!posts || posts.length === 0) {
                container.innerHTML = '<div class="p-8 text-center text-gray-500">表示できる投稿はありません。</div>';
                return;
            }
            posts.forEach(post => {
                const avatarHtml = `<div onclick="navigateToPage('profile', '${post.username}')" class="cursor-pointer hover:opacity-80 transition">${getAvatarHtml(post.icon_url, "w-11 h-11 rounded-full object-cover flex-shrink-0")}</div>`;
                const hasLiked = post.isLiked === true;

                let replyTagHtml = '';
                if (post.post_type === 'reply' && post.reply_parent) {
                    replyTagHtml = `<div class="text-xs text-gray-400 mb-1 bg-[#192734]/30 p-2 rounded border border-dashed border-[#38444d]"><i class="far fa-comment-dots mr-1"></i> @${post.reply_to} への返信: <span class="text-gray-500 italic">${post.reply_parent.message}</span></div>`;
                }

                let repostTagHtml = '';
                if (post.post_type === 'repost' && post.repost_parent) {
                    repostTagHtml = `
                        <div class="text-xs text-[#5999FF] mb-1"><i class="fas fa-retweet mr-1"></i> @${post.username} がリポスト</div>
                        <div class="bg-zinc-900/40 p-3 rounded-xl border border-[#38444d] my-2 text-sm w-full">
                           <span class="font-bold text-gray-300">@${post.repost_of}</span>
                           <p class="text-gray-400 mt-1">${post.repost_parent.message}</p>
                        </div>`;
                }

                const postHtml = `
                    <div class="p-4 hover:bg-[#192734]/40 flex space-x-3 transition w-full">
                        ${avatarHtml}
                        <div class="flex-1 min-w-0">
                            ${post.post_type === 'repost' ? repostTagHtml : ''}
                            <div class="flex items-center space-x-2 text-sm">
                                <span onclick="navigateToPage('profile', '${post.username}')" class="font-bold text-white truncate cursor-pointer hover:underline">${post.display_name}</span>
                                <span onclick="navigateToPage('profile', '${post.username}')" class="text-gray-400 truncate cursor-pointer">@${post.username}</span>
                                <span class="text-gray-500">·</span>
                                <span onclick="navigateToPage('post', '${post.id}')" class="text-gray-500 text-xs cursor-pointer hover:underline">${post.timestamp}</span>
                            </div>
                            ${post.post_type === 'reply' ? replyTagHtml : ''}
                            ${post.post_type !== 'repost' ? `<div class="text-white mt-1 break-words whitespace-pre-wrap text-[15px]">${linkify(post.message || '')}</div>` : ''}
                            
                            <div class="flex justify-between max-w-md mt-3 text-gray-500 text-sm">
                                <button onclick="openReplyModal('${post.id}', '${post.username}')" class="hover:text-[#5999FF] transition cursor-pointer flex items-center"><i class="far fa-comment mr-1"></i><span>返信</span></button>
                                <button onclick="openRepostModal('${post.id}', '${post.username}')" class="hover:text-green-500 transition cursor-pointer flex items-center"><i class="fas fa-retweet mr-1"></i><span>リポスト</span></button>
                                <button onclick="toggleLike('${post.id}', this)" class="hover:text-pink-500 transition cursor-pointer ${hasLiked ? 'text-pink-500' : ''}" data-liked="${hasLiked}"><i class="${hasLiked ? 'fas' : 'far'} fa-heart mr-1"></i><span>${post.likes || 0}</span></button>
                                <div class="text-gray-600 flex items-center select-none"><i class="far fa-chart-bar mr-1"></i><span>${post.views || 0}</span></div>
                            </div>
                        </div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', postHtml);
            });
        }

        function submitPost() {
            const textarea = document.getElementById('post-message');
            const message = textarea.value.trim();
            if (!message) return;

            const btn = document.getElementById('btn-post-submit');
            const btnText = document.getElementById('btn-post-text');
            
            // 🔒 連打ロック発動
            btn.disabled = true;
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.5';
            btnText.innerHTML = '<i class="fas fa-spinner animate-spin mr-1"></i> 送信中...';

            fetch(GAS_API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'createPost', username: currentUser.username, message: message }) 
            })
            .then(res => res.json())
            .then(res => {
                if (res.success) {
                    textarea.value = '';
                    document.getElementById('char-count').innerText = "0 / 140";
                    loadTimeline(false);
                }
            })
            .finally(() => {
                // 🔓 ロック解除
                btn.disabled = false;
                btn.style.pointerEvents = 'auto';
                btn.style.opacity = '1';
                btnText.innerText = '届け！';
            });
        }

        function openReplyModal(postId, username) {
            const html = `
                <h3 class="text-lg font-bold mb-3">@${username} へ返信</h3>
                <textarea id="modal-reply-msg" placeholder="返信を部屋に響かせる..." class="w-full bg-[#15202b] border twitter-border p-3 rounded-xl h-24 text-white outline-none focus:border-[#5999FF] resize-none"></textarea>
                <div class="flex justify-end mt-3">
                    <button id="btn-reply-submit" onclick="submitReply('${postId}')" class="brand-color-bg text-white font-bold px-5 py-2 rounded-full text-sm flex items-center">
                       <span id="btn-reply-text">返信を送信</span>
                    </button>
                </div>`;
            openCustomModal(html);
        }
        function submitReply(parentPostId) {
            const message = document.getElementById('modal-reply-msg').value.trim();
            if (!message) return;
            fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'createPost', username: currentUser.username, message: message, reply_to: parentPostId, post_type: 'reply' }) })
            .then(() => { closeCustomModal(); applyURLRoute(); });
        }

        function openRepostModal(postId, username) {
            const html = `
                <h3 class="text-lg font-bold mb-2">リポストしますか？</h3>
                <div class="flex justify-end space-x-3"><button onclick="closeCustomModal()" class="bg-zinc-800 text-white px-4 py-2 rounded-full text-sm">やめる</button><button onclick="submitRepost('${postId}')" class="bg-[#5999FF] text-white font-bold px-5 py-2 rounded-full text-sm">リポスト</button></div>`;
            openCustomModal(html);
        }
        function submitRepost(targetPostId) {
            fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'createPost', username: currentUser.username, message: '', repost_of: targetPostId, post_type: 'repost' }) })
            .then(() => { closeCustomModal(); loadTimeline(false); });
        }

        // 🛡️ ==========================================
        //   Google reCAPTCHA v2 フロントエンド制御ロジック
        // =============================================
        // 1. ログイン処理トリガー
        function triggerLoginWithCaptcha() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();
            if (!email || !password) { alert('資格情報を入力してください。'); return; }
            
            // ボタンのローディング化
            document.getElementById('btn-login-submit').style.pointerEvents = 'none';
            document.getElementById('btn-login-text').innerHTML = '<i class="fas fa-spinner animate-spin mr-1"></i> 安全性を検証中...';
            
            // reCAPTCHAの検証を実行（チャレンジが出現するか、自動でパスします）
            grecaptcha.execute(0); // 0番目のインデックス（ログイン用）
        }

        // ログイン検証成功時に自動で走るコールバック
        function onLoginCaptchaSuccess(token) {
            // 検証トークンが取れたらそのまま裏でログインAPIを叩く
            executeLoginAction();
            // 次回のためにreCAPTCHAの状態をリセット
            grecaptcha.reset(0);
        }

        function executeLoginAction() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();
            fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', email, password }) })
            .then(res => res.json())
            .then(res => {
                if (res.success) { loginSuccess(res.user); } 
                else if (res.isBlocked) {
                    document.getElementById('auth-gate').classList.add('hidden');
                    const blockGate = document.getElementById('block-gate');
                    const iconArea = document.getElementById('block-icon-area');
                    const titleArea = document.getElementById('block-title');
                    const descArea = document.getElementById('block-desc');
                    const actionArea = document.getElementById('block-action-area');
                    blockGate.classList.remove('hidden');
                    actionArea.innerHTML = '';

                    if (res.status === 'Ban') {
                        iconArea.innerText = "🚨"; titleArea.innerText = "アカウントが凍結されています";
                        titleArea.className = "text-2xl font-bold text-red-400";
                        descArea.innerText = "規約違反または運営判断により、このアカウントはロックされています。";
                        actionArea.innerHTML = `<button onclick="location.reload()" class="bg-zinc-800 text-white px-6 py-2 rounded-full font-bold">戻る</button>`;
                    } else if (res.status === 'Stop') {
                        iconArea.innerText = "💤"; titleArea.innerText = "現在休眠状態です";
                        titleArea.className = "text-2xl font-bold text-amber-400";
                        descArea.innerText = "アカウントは一時停止されています。いつでも即座に再始動できます！";
                        actionArea.innerHTML = `<div class="flex flex-col space-y-3"><button onclick="reactivateAccount('${res.username}')" class="brand-color-bg text-white px-6 py-3 rounded-full font-bold shadow-lg">居間を再始動する</button><button onclick="location.reload()" class="text-gray-400 text-sm hover:underline">ログインに戻る</button></div>`;
                    }
                } else {
                    alert('ログイン失敗: ' + res.error);
                }
            })
            .finally(() => {
                document.getElementById('btn-login-submit').style.pointerEvents = 'auto';
                document.getElementById('btn-login-text').innerText = '居間に入る';
            });
        }

        // 2. 新規入居処理トリガー
        function triggerRegisterWithCaptcha() {
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            const passwordConfirm = document.getElementById('reg-password-confirm').value.trim();
            const birthday = document.getElementById('reg-birth').value;
            const username = document.getElementById('reg-username').value.trim().replace('@','');
            if (!email || !password || !passwordConfirm || !birthday || !username) { alert('必須項目が未入力です。'); return; }
            if (password !== passwordConfirm) { alert('パスワードが一致しません。'); return; }

            document.getElementById('btn-reg-submit').style.pointerEvents = 'none';
            document.getElementById('btn-reg-text').innerHTML = '<i class="fas fa-spinner animate-spin mr-1"></i> 安全性を検証中...';

            grecaptcha.execute(1); // 1番目のインデックス（新規登録用）
        }

        // 新規登録検証成功時に自動で走るコールバック
        function onRegisterCaptchaSuccess(token) {
            executeRegisterAction();
            grecaptcha.reset(1);
        }

        async function executeRegisterAction() {
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            const birthday = document.getElementById('reg-birth').value;
            const username = document.getElementById('reg-username').value.trim().replace('@','');
            let display_name = document.getElementById('reg-display').value.trim() || '新参者';
            let icon_url = 'logo.jpg';
            if (document.getElementById('reg-icon-file').files[0]) icon_url = await fileToBase64(document.getElementById('reg-icon-file').files[0]);

            fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'register', username, display_name, icon_url, email, password, birthday }) })
            .then(res => res.json())
            .then(res => { 
                if (res.success) { loginSuccess(res.user); } 
                else { alert(res.error); } 
            })
            .finally(() => {
                document.getElementById('btn-reg-submit').style.pointerEvents = 'auto';
                document.getElementById('btn-reg-text').innerText = '入居を確定する';
            });
        }


        // 共通系ロジック（変更なし）
        function openStopConfirmModal() {
            const html = `<h3 class="text-lg font-bold text-amber-400 mb-2"><i class="fas fa-moon mr-2"></i>部屋を休眠状態(Stop)にしますか？</h3><p class="text-gray-300 text-sm leading-relaxed mb-4">一時停止すると自動的にログアウトされ、他の住人からは一時的に「休眠中の住人」と表示されます。<br><span class="text-amber-300 font-bold">いつでもログインし直すだけで自動的に部屋を完全復活（再始動）させることができます。</span></p><div class="flex justify-end space-x-3"><button onclick="closeCustomModal()" class="bg-zinc-800 text-white px-4 py-2 rounded-full text-sm">キャンセル</button><button onclick="submitChangeStatus('Stop')" class="bg-amber-600 text-white font-bold px-5 py-2 rounded-full text-sm">一時停止する</button></div>`;
            openCustomModal(html);
        }
        function openDeleteConfirmModal() {
            const html = `<h3 class="text-lg font-bold text-red-400 mb-2"><i class="fas fa-exclamation-triangle mr-2"></i>全データの完全削除（完全退去）</h3><p class="text-gray-300 text-sm leading-relaxed mb-4">このボタンを押すと、あなたのユーザーデータ、およびこれまでのすべての投稿が<span class="text-red-400 font-bold underline">データベースから跡形もなく完全物理削除</span>されます。二度と元には戻せません。</p><div class="flex justify-end space-x-3"><button onclick="closeCustomModal()" class="bg-zinc-800 text-white px-4 py-2 rounded-full text-sm">キャンセル</button><button onclick="submitDeleteAccount()" class="bg-red-600 text-white font-bold px-5 py-2 rounded-full text-sm">すべてを完全に消去する</button></div>`;
            openCustomModal(html);
        }
        function submitChangeStatus(statusType) { fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'changeStatus', username: currentUser.username, status: statusType }) }).then(() => { handleLogout(); }); }
        function submitDeleteAccount() { fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteAccount', username: currentUser.username }) }).then(() => { handleLogout(); }); }
        function reactivateAccount(username) { fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'reactivate', username: username }) }).then(res => res.json()).then(res => { if (res.success) { document.getElementById('block-gate').classList.add('hidden'); loginSuccess(res.user); } else { alert(res.error); } }); }
        function loginSuccess(user) { currentUser = user; localStorage.setItem('loggia_user', JSON.stringify(user)); document.getElementById('auth-gate').classList.add('hidden'); updateUserUI(); exitProfileMode(); }
        function handleLogout() { if(autoRefreshInterval) clearInterval(autoRefreshInterval); localStorage.removeItem('loggia_user'); location.reload(); }
        function getAvatarHtml(url, cssClass = "w-10 h-10 rounded-full object-cover") { if (!url || url === 'logo.jpg') return `<img src="logo.jpg" class="${cssClass} bg-[#000000]" onerror="this.src='https://placehold.co/100x100/000000/ffffff?text=L'">`; return `<img src="${url}" class="${cssClass}">`; }
        function updateUserUI() { if (!currentUser) return; document.getElementById('nav-avatar-container').innerHTML = getAvatarHtml(currentUser.icon_url); document.getElementById('form-avatar-container').innerHTML = getAvatarHtml(currentUser.icon_url, "w-12 h-12 rounded-full object-cover"); document.getElementById('nav-display-name').innerText = currentUser.display_name || '住人'; document.getElementById('nav-username').innerText = '@' + currentUser.username; }
        function switchTab(tabName) { if (tabName === 'timeline') { document.getElementById('tab-timeline').classList.remove('hidden'); document.getElementById('tab-profile-edit').classList.add('hidden'); exitProfileMode(); } else { document.getElementById('tab-timeline').classList.add('hidden'); document.getElementById('tab-profile-edit').classList.remove('hidden'); document.getElementById('edit-display-name').value = currentUser.display_name || ''; document.getElementById('edit-bio').value = currentUser.bio || ''; const preview = document.getElementById('edit-preview'); if (currentUser.icon_url) { preview.src = currentUser.icon_url; preview.classList.remove('hidden'); } } }
        function linkify(text) { return text.replace(/(https?:\/\/[^\s]+)/g, url => `<a href="#" onclick="safeNavigate('${url}'); return false;" class="text-blue-400 hover:underline break-all"><i class="fas fa-external-link-alt text-xs mr-1"></i>${url}</a>`); }
        function safeNavigate(url) { if (confirm(`外部サイトへ移動しますか？\n\n${url}`)) window.open(url, '_blank', 'noopener,noreferrer'); }
        function previewImage(input, previewId) { const preview = document.getElementById(previewId); if (input.files[0]) { const reader = new FileReader(); reader.onload = e => { preview.src = e.target.result; preview.classList.remove('hidden'); }; reader.readAsDataURL(input.files[0]); } }
        function fileToBase64(file) { return new Promise((resolve, reject) => { if (!file) resolve(''); const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => resolve(reader.result); reader.onerror = e => reject(e); }); }
        function toggleLike(postId, buttonEl) { const heartIcon = buttonEl.querySelector('i'); const countSpan = buttonEl.querySelector('span'); buttonEl.style.pointerEvents = 'none'; fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'toggleLike', postId: postId, username: currentUser.username }) }).then(res => res.json()).then(res => { buttonEl.style.pointerEvents = 'auto'; if (res.success) { buttonEl.setAttribute('data-liked', String(res.isLiked)); countSpan.innerText = res.likesCount; if (res.isLiked) { heartIcon.className = 'fas fa-heart text-pink-500 mr-1'; buttonEl.classList.add('text-pink-500'); } else { heartIcon.className = 'far fa-heart mr-1'; buttonEl.classList.remove('text-pink-500'); } } }).catch(() => { buttonEl.style.pointerEvents = 'auto'; }); }
    </script>
