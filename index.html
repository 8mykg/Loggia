<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loggia - インターネットの居間と今</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #15202b; color: #fff; }
        .twitter-border { border-color: #38444d; }
        .twitter-blue { background-color: #1d9bf0; }
        .twitter-blue-text { color: #1d9bf0; }
        .twitter-hover:hover { background-color: #192734; }
    </style>
</head>
<body class="font-sans">

    <div id="auth-gate" class="fixed inset-0 bg-[#15202b] z-50 flex items-center justify-center hidden">
        <div class="bg-[#192734] border twitter-border p-8 rounded-2xl w-full max-w-md space-y-6 shadow-2xl">
            <div class="text-4xl text-center twitter-blue-text font-serif italic">Loggia</div>
            <p class="text-center text-gray-400 text-sm">インターネットの「いま」ちょっと見よ？</p>
            
            <div class="flex border-b twitter-border text-center">
                <button onclick="toggleAuthTab('login')" id="btn-tab-login" class="w-1/2 pb-2 font-bold border-b-2 border-transparent twitter-blue-text !border-[#1d9bf0]">ログイン</button>
                <button onclick="toggleAuthTab('register')" id="btn-tab-register" class="w-1/2 pb-2 font-bold text-gray-400 border-b-2 border-transparent">入居申し込み</button>
            </div>

            <div id="form-login" class="space-y-4">
                <input type="email" id="login-email" placeholder="メールアドレス" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none focus:border-[#1d9bf0]">
                <input type="password" id="login-password" placeholder="パスワード" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none focus:border-[#1d9bf0]">
                <button onclick="handleLogin()" class="w-full twitter-blue text-white font-bold py-3 rounded-full hover:opacity-90 cursor-pointer">居間に入る</button>
            </div>

            <div id="form-register" class="space-y-4 hidden h-[400px] overflow-y-auto pr-1">
                <p class="text-xs text-orange-400">*必須項目を入力してね！</p>
                <input type="email" id="reg-email" placeholder="メールアドレス (必須)" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none">
                
                <input type="password" id="reg-password" placeholder="パスワード (必須)" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none">
                <input type="password" id="reg-password-confirm" placeholder="パスワードの確認 (必須)" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none">
                
                <div>
                    <label class="text-xs text-gray-400 block mb-1">誕生日 (非公開・必須)</label>
                    <input type="date" id="reg-birth" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none text-gray-400">
                </div>
                <input type="text" id="reg-username" placeholder="住人ID (英数字・必須)" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none">
                <input type="text" id="reg-display" placeholder="表札の名前 (空欄だと新参者)" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none">
                <input type="text" id="reg-icon" placeholder="アイコン画像URL (無かったらユザネの頭文字)" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none">
                <button onclick="handleRegister()" class="w-full twitter-blue text-white font-bold py-3 rounded-full hover:opacity-90 cursor-pointer">いまに飛び込む</button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto flex min-h-screen">
        
        <header class="w-1/4 border-r twitter-border p-4 flex flex-col justify-between h-screen sticky top-0 hidden md:flex">
            <div class="space-y-4 text-xl font-bold">
                <div class="text-3xl p-2 twitter-blue-text font-serif italic tracking-wider">Loggia</div>
                <button onclick="switchTab('timeline')" class="w-full text-left p-3 rounded-full twitter-hover cursor-pointer"><i class="fas fa-couch mr-4"></i>居間 (ホーム)</button>
                <button onclick="switchTab('profile-edit')" class="w-full text-left p-3 rounded-full twitter-hover cursor-pointer"><i class="fas fa-door-open mr-4"></i>模様替え (設定)</button>
                <button onclick="handleLogout()" class="w-full text-left p-3 rounded-full text-red-400 twitter-hover cursor-pointer"><i class="fas fa-sign-out-alt mr-4"></i>退出する</button>
            </div>
            <div class="flex items-center space-x-3 p-2 border mt-auto twitter-border rounded-full">
                <img id="nav-avatar" src="https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png" class="w-10 h-10 rounded-full object-cover">
                <div class="overflow-hidden">
                    <div id="nav-display-name" class="font-bold truncate">ゲスト</div>
                    <div id="nav-username" class="text-gray-400 text-sm truncate">@guest</div>
                </div>
            </div>
        </header>

        <main class="flex-1 border-r twitter-border min-h-screen pb-16 md:pb-0">
            <section id="tab-timeline" class="block">
                <div class="sticky top-0 bg-[#15202b]/80 backdrop-blur border-b twitter-border p-4 font-bold text-xl flex justify-between items-center z-10">
                    <span>Loggia の「今」</span>
                    <span class="text-xs font-normal text-gray-400">インターネットの居間と今</span>
                </div>
                <div class="border-b twitter-border p-4 flex space-x-3">
                    <img id="form-avatar" src="https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png" class="w-12 h-12 rounded-full object-cover">
                    <div class="flex-1">
                        <textarea id="post-message" placeholder="いまどうしてる？" class="w-full bg-transparent text-xl outline-none resize-none h-24" maxlength="140"></textarea>
                        <div class="flex justify-between items-center pt-2 border-t twitter-border mt-2">
                            <span class="text-sm text-gray-500" id="char-count">0 / 140</span>
                            <button onclick="submitPost()" class="twitter-blue text-white font-bold px-5 py-2 rounded-full cursor-pointer hover:opacity-90">届け！</button>
                        </div>
                    </div>
                </div>
                <div id="timeline-loading" class="p-8 text-center text-gray-400"><i class="fas fa-spinner animate-spin mr-2"></i>居間をのぞき中...</div>
                <div id="timeline-posts" class="divide-y twitter-border"></div>
            </section>

            <section id="tab-profile-edit" class="hidden p-4">
                <div class="font-bold text-xl mb-6 border-b twitter-border pb-2">自室の模様替え（プロフィール設定）</div>
                <div class="space-y-4 max-w-md">
                    <div>
                        <label class="block text-gray-400 text-sm mb-1">表札の名前（表示名）</label>
                        <input type="text" id="edit-display-name" class="w-full bg-[#192734] border twitter-border p-2 rounded outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-400 text-sm mb-1">アイコン画像URL</label>
                        <input type="text" id="edit-icon-url" class="w-full bg-[#192734] border twitter-border p-2 rounded outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-400 text-sm mb-1">自己紹介・部屋の説明</label>
                        <textarea id="edit-bio" class="w-full bg-[#192734] border twitter-border p-2 rounded outline-none h-24 resize-none"></textarea>
                    </div>
                    <button onclick="saveProfile()" class="twitter-blue text-white font-bold px-6 py-2 rounded-full cursor-pointer hover:opacity-90">模様替えを保存</button>
                </div>
            </section>
        </main>

        <footer class="fixed bottom-0 left-0 right-0 bg-[#15202b] border-t twitter-border flex justify-around p-3 md:hidden z-20">
            <button onclick="switchTab('timeline')" class="text-2xl text-gray-400 focus:text-white"><i class="fas fa-couch"></i></button>
            <button onclick="switchTab('profile-edit')" class="text-2xl text-gray-400 focus:text-white"><i class="fas fa-door-open"></i></button>
            <button onclick="handleLogout()" class="text-2xl text-red-400"><i class="fas fa-sign-out-alt"></i></button>
        </footer>
    </div>

    <script>
        // 🚨【超重要】ここにあなたのGASの「ウェブアプリURL」を貼り付けてください！
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyCnsVLKorpz98tD-aycq2aodvafbMpCtjql-mGcFmi1HOA36cC8S3RAkZEqthbVbxk/exec';

        let currentUser = null;

        window.onload = function() {
            const cached = localStorage.getItem('loggia_user');
            if (cached) {
                currentUser = JSON.parse(cached);
                updateUserUI();
                loadTimeline();
            } else {
                document.getElementById('auth-gate').classList.remove('hidden');
            }

            document.getElementById('post-message').oninput = function() {
                document.getElementById('char-count').innerText = this.value.length + " / 140";
            };
        };

        function toggleAuthTab(tab) {
            if (tab === 'login') {
                document.getElementById('form-login').classList.remove('hidden');
                document.getElementById('form-register').classList.add('hidden');
                document.getElementById('btn-tab-login').classList.add('twitter-blue-text', '!border-[#1d9bf0]');
                document.getElementById('btn-tab-register').classList.remove('twitter-blue-text', '!border-[#1d9bf0]');
            } else {
                document.getElementById('form-login').classList.add('hidden');
                document.getElementById('form-register').classList.remove('hidden');
                document.getElementById('btn-tab-register').classList.add('twitter-blue-text', '!border-[#1d9bf0]');
                document.getElementById('btn-tab-login').classList.remove('twitter-blue-text', '!border-[#1d9bf0]');
            }
        }

        function handleRegister() {
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            const passwordConfirm = document.getElementById('reg-password-confirm').value.trim();
            const birthdate = document.getElementById('reg-birth').value;
            const username = document.getElementById('reg-username').value.trim().replace('@','');
            let display_name = document.getElementById('reg-display').value.trim();
            const icon_url = document.getElementById('reg-icon').value.trim();

            if (!email || !password || !passwordConfirm || !birthdate || !username) {
                alert('必須項目が埋まっていないよ！');
                return;
            }

            // 🔍 改善：入力された2つのパスワードが一致しているかチェック
            if (password !== passwordConfirm) {
                alert('入力されたパスワードと確認用パスワードが一致していないよ！もう一度確認してみてね。');
                return;
            }

            // 空欄時のデフォルト値を「新参者」に設定
            if (!display_name) {
                display_name = '新参者';
            }

            fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'register', email, password, birthdate, username, icon_url, display_name }) })
            .then(res => res.json())
            .then(res => {
                if (res.success) {
                    alert('入居申し込みが完了したよ！');
                    loginSuccess(res.user);
                } else {
                    alert('あれ、登録に問題が発生したようです...(管理者案件)：' + res.error);
                }
            });
        }

        function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if (!email || !password) return;

            fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', email, password }) })
            .then(res => res.json())
            .then(res => {
                if (res.success) {
                    loginSuccess(res.user);
                } else {
                    alert('エラーだ！！(管理者案件)：' + res.error);
                }
            });
        }

        function loginSuccess(user) {
            currentUser = user;
            localStorage.setItem('loggia_user', JSON.stringify(user));
            document.getElementById('auth-gate').classList.add('hidden');
            updateUserUI();
            
            document.getElementById('edit-display-name').value = currentUser.display_name;
            document.getElementById('edit-icon-url').value = currentUser.icon_url;
            document.getElementById('edit-bio').value = currentUser.bio || '';
            
            loadTimeline();
        }

        function handleLogout
