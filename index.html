<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loggia - インターネットの居間と今</title>
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #15202b; color: #fff; }
        .twitter-border { border-color: #38444d; }
        .brand-color-bg { background-color: #5999FF; }
        .brand-color-text { color: #5999FF; }
        .twitter-hover:hover { background-color: #192734; }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #192734; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #38444d; border-radius: 3px; }
    </style>
</head>
<body class="font-sans">

    <div id="auth-gate" class="fixed inset-0 bg-[#15202b] z-50 flex items-center justify-center hidden">
        <div class="bg-[#192734] border twitter-border p-8 rounded-2xl w-full max-w-md space-y-6 shadow-2xl">
            <div class="flex flex-col items-center space-y-3">
                <img src="logo.jpg" alt="Loggia Logo" class="w-20 h-20 object-cover shadow-md bg-[#000000]" onerror="this.src='https://placehold.co/100x100/000000/ffffff?text=Loggia'">
                <div class="text-2xl font-light tracking-widest text-gray-200">Loggia</div>
            </div>
            <p class="text-center text-gray-400 text-sm">インターネットの「いま」が集まる居間へ。</p>
            
            <div class="flex border-b twitter-border text-center">
                <button onclick="toggleAuthTab('login')" id="btn-tab-login" class="w-1/2 pb-2 font-bold border-b-2 brand-color-text !border-[#5999FF]">ログイン</button>
                <button onclick="toggleAuthTab('register')" id="btn-tab-register" class="w-1/2 pb-2 font-bold text-gray-400 border-b-2 border-transparent">入居申し込み</button>
            </div>

            <div id="form-login" class="space-y-4">
                <input type="email" id="login-email" placeholder="メールアドレス" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none focus:border-[#5999FF]">
                <input type="password" id="login-password" placeholder="パスワード" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none focus:border-[#5999FF]">
                <button onclick="handleLogin()" class="w-full brand-color-bg text-white font-bold py-3 rounded-full hover:opacity-90 cursor-pointer">居間に入る</button>
            </div>

            <div id="form-register" class="space-y-4 hidden h-[400px] overflow-y-auto pr-1 custom-scroll">
                <input type="email" id="reg-email" placeholder="メールアドレス (必須)" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none">
                <input type="password" id="reg-password" placeholder="パスワード (必須)" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none">
                <input type="password" id="reg-password-confirm" placeholder="パスワードの確認 (必須)" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none">
                <div>
                    <label class="text-xs text-gray-400 block mb-1">誕生日 (必須)</label>
                    <input type="date" id="reg-birth" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none text-gray-400">
                </div>
                <input type="text" id="reg-username" placeholder="住人ID (英数字・必須)" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none">
                <input type="text" id="reg-display" placeholder="表札の名前 (空欄の場合は新参者)" class="w-full bg-[#15202b] border twitter-border p-3 rounded outline-none">
                
                <div class="bg-[#15202b] p-3 rounded border twitter-border space-y-3">
                    <label class="text-xs text-gray-400 block">アイコン画像（任意）</label>
                    <div class="flex items-center space-x-4">
                        <input type="file" id="reg-icon-file" accept="image/*" onchange="previewImage(this, 'reg-preview')" class="block w-full text-xs text-gray-400 file:mr-3 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:bg-zinc-800 file:text-white hover:file:bg-zinc-700 cursor-pointer">
                        <img id="reg-preview" src="logo.jpg" class="w-12 h-12 rounded-full object-cover border twitter-border hidden">
                    </div>
                </div>
                <button onclick="handleRegister()" class="w-full brand-color-bg text-white font-bold py-3 rounded-full hover:opacity-90 cursor-pointer">アカウントを作成して入居</button>
            </div>
        </div>
    </div>

    <div class="w-full flex min-h-screen justify-center">
        
        <header class="w-64 border-r twitter-border p-4 flex flex-col justify-between h-screen sticky top-0 hidden md:flex flex-shrink-0 z-30">
            <div class="space-y-6 text-xl font-bold">
                <div class="flex items-center space-x-3 p-2">
                    <img src="logo.jpg" alt="Loggia" class="w-10 h-10 object-cover shadow bg-[#000000]" onerror="this.src='https://placehold.co/50x50/000000/ffffff?text=L'">
                    <div class="text-lg font-light tracking-widest text-gray-300">Loggia</div>
                </div>
                <nav class="space-y-2 text-[16px]">
                    <button onclick="switchTab('timeline')" class="w-full text-left p-3 rounded-full twitter-hover cursor-pointer flex items-center"><i class="fas fa-couch w-8 text-center mr-2 text-gray-400"></i>居間</button>
                    <button onclick="switchTab('profile-edit')" class="w-full text-left p-3 rounded-full twitter-hover cursor-pointer flex items-center"><i class="fas fa-door-open w-8 text-center mr-2 text-gray-400"></i>模様替え</button>
                    <button onclick="handleLogout()" class="w-full text-left p-3 rounded-full text-red-400/80 twitter-hover cursor-pointer flex items-center"><i class="fas fa-sign-out-alt w-8 text-center mr-2"></i>退出</button>
                </nav>
            </div>
            
            <div class="flex items-center space-x-2 p-2 border mt-auto twitter-border rounded-full bg-[#192734]/20 text-sm">
                <div id="nav-avatar-container" class="w-8 h-8 flex-shrink-0"></div>
                <div class="overflow-hidden">
                    <div id="nav-display-name" class="font-bold truncate">ゲスト</div>
                    <div id="nav-username" class="text-gray-400 text-xs truncate">@guest</div>
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-3xl border-r border-l twitter-border min-h-screen pb-20 md:pb-0 mx-0 md:mx-4">
            
            <section id="tab-timeline" class="block">
                <div class="sticky top-0 bg-[#15202b]/80 backdrop-blur border-b twitter-border p-4 font-bold text-xl flex justify-between items-center z-10">
                    <div class="flex items-center space-x-3">
                        <span>Loggia の「今」</span>
                        <span id="sync-status" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-500/10 text-green-400 border border-green-500/20 animate-pulse">
                          <span id="sync-dot" class="w-1.5 h-1.5 mr-1.5 bg-green-400 rounded-full"></span><span id="sync-text">自動同期中</span>
                        </span>
                    </div>
                </div>
                
                <div class="border-b twitter-border p-4 flex space-x-3 bg-[#192734]/10">
                    <div id="form-avatar-container" class="w-12 h-12 flex-shrink-0"></div>
                    <div class="flex-1">
                        <textarea id="post-message" placeholder="いまどうしてる？" class="w-full bg-transparent text-xl outline-none resize-none h-24 pt-1" maxlength="140"></textarea>
                        <div class="flex justify-between items-center pt-2 border-t twitter-border mt-2">
                            <span class="text-sm text-gray-500" id="char-count">0 / 140</span>
                            <button onclick="submitPost()" class="brand-color-bg text-white font-bold px-5 py-2 rounded-full cursor-pointer hover:opacity-90">届け！</button>
                        </div>
                    </div>
                </div>
                <div id="timeline-loading" class="p-8 text-center text-gray-400"><i class="fas fa-spinner animate-spin mr-2"></i>居間をのぞき中...</div>
                <div id="timeline-posts" class="divide-y twitter-border"></div>
            </section>

            <section id="tab-profile-edit" class="hidden p-6">
                <div class="font-bold text-xl mb-6 border-b twitter-border pb-2">自室の模様替え</div>
                <div class="space-y-5 max-w-md">
                    <div>
                        <label class="block text-gray-400 text-sm mb-1">表札の名前</label>
                        <input type="text" id="edit-display-name" class="w-full bg-[#192734] border twitter-border p-2.5 rounded outline-none focus:border-[#5999FF]">
                    </div>
                    <div class="bg-[#192734]/40 p-4 rounded-xl border twitter-border space-y-3">
                        <label class="block text-gray-400 text-sm">新しいアイコン画像</label>
                        <div class="flex items-center space-x-4">
                            <input type="file" id="edit-icon-file" accept="image/*" onchange="previewImage(this, 'edit-preview')" class="block w-full text-xs text-gray-400 file:mr-3 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:bg-zinc-800 file:text-white hover:file:bg-zinc-700 cursor-pointer">
                            <img id="edit-preview" src="" class="w-14 h-14 rounded-full object-cover border twitter-border hidden">
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-400 text-sm mb-1">自己紹介</label>
                        <textarea id="edit-bio" class="w-full bg-[#192734] border twitter-border p-2.5 rounded outline-none h-24 resize-none focus:border-[#5999FF]"></textarea>
                    </div>
                    <button onclick="saveProfile()" class="brand-color-bg text-white font-bold px-6 py-2.5 rounded-full cursor-pointer hover:opacity-90">模様替えを保存</button>
                </div>
            </section>
        </main>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 bg-[#15202b]/95 backdrop-blur border-t border-[#38444d] flex justify-around p-3 md:hidden z-20 shadow-lg">
        <button onclick="switchTab('timeline')" class="text-2xl text-gray-400 focus:text-white px-4 py-1"><i class="fas fa-couch"></i></button>
        <button onclick="switchTab('profile-edit')" class="text-2xl text-gray-400 focus:text-white px-4 py-1"><i class="fas fa-door-open"></i></button>
        <button onclick="handleLogout()" class="text-2xl text-red-400/80 px-4 py-1"><i class="fas fa-sign-out-alt"></i></button>
    </footer>

    <script>
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyCnsVLKorpz98tD-aycq2aodvafbMpCtjql-mGcFmi1HOA36cC8S3RAkZEqthbVbxk/exec';

        let currentUser = null;
        let autoRefreshInterval = null;

        window.onload = function() {
            const cached = localStorage.getItem('loggia_user');
            if (cached) {
                currentUser = JSON.parse(cached);
                updateUserUI();
                loadTimeline(false); // 🛠️ 初回ロードは閲覧数を増やす
                startAutoRefresh();
            } else {
                document.getElementById('auth-gate').classList.remove('hidden');
            }
            document.getElementById('post-message').oninput = function() {
                document.getElementById('char-count').innerText = this.value.length + " / 140";
            };
        };

        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(() => {
                if (!document.getElementById('tab-timeline').classList.contains('hidden')) {
                    loadTimeline(true); // 🛠️ 自動同期は「isAutoRefresh=true」で閲覧数を増やさない！
                }
            }, 10000);
        }

        function setSyncStatus(isOnline) {
            const statusEl = document.getElementById('sync-status');
            const dotEl = document.getElementById('sync-dot');
            const textEl = document.getElementById('sync-text');
            
            if (isOnline) {
                statusEl.className = "inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-500/10 text-green-400 border border-green-500/20 animate-pulse";
                dotEl.className = "w-1.5 h-1.5 mr-1.5 bg-green-400 rounded-full";
                textEl.innerText = "自動同期中";
            } else {
                statusEl.className = "inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-500/10 text-red-400 border border-red-500/20";
                dotEl.className = "w-1.5 h-1.5 mr-1.5 bg-red-500 rounded-full";
                textEl.innerText = "同期不可";
            }
        }

        function loadTimeline(isAutoRefresh = false) {
            if (!currentUser) return;
            if (!isAutoRefresh) document.getElementById('timeline-loading').classList.remove('hidden');
            
            // 🛠️ クエリパラメータに自動同期フラグを付与！
            fetch(`${GAS_API_URL}?action=getTimeline&username=${currentUser.username}&isAutoRefresh=${isAutoRefresh}`)
            .then(res => res.json())
            .then(res => {
                if (!isAutoRefresh) document.getElementById('timeline-loading').classList.add('hidden');
                if (res.success) {
                    setSyncStatus(true); // 🟢 オンライン
                    renderTimeline(res.data);
                } else {
                    setSyncStatus(false); // 🔴 エラー
                }
            })
            .catch(() => {
                if (!isAutoRefresh) document.getElementById('timeline-loading').classList.add('hidden');
                setSyncStatus(false); // 🔴 応答なし（サーバーダウンなど）
            });
        }

        function linkify(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, function(url) {
                return `<a href="#" onclick="safeNavigate('${url}'); return false;" class="text-blue-400 hover:underline break-all"><i class="fas fa-external-link-alt text-xs mr-1"></i>${url}</a>`;
            });
        }

        function safeNavigate(url) {
            if (confirm(`【外部サイトへの移動確認】\n\nLoggiaを離れ、次のURLへ移動しますか？\n\n${url}`)) {
                window.open(url, '_blank', 'noopener,noreferrer');
            }
        }

        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            } else {
                preview.classList.add('hidden');
            }
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                if (!file) resolve('');
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function toggleAuthTab(tab) {
            if (tab === 'login') {
                document.getElementById('form-login').classList.remove('hidden');
                document.getElementById('form-register').classList.add('hidden');
                document.getElementById('btn-tab-login').className = "w-1/2 pb-2 font-bold border-b-2 brand-color-text !border-[#5999FF]";
                document.getElementById('btn-tab-register').className = "w-1/2 pb-2 font-bold text-gray-400 border-b-2 border-transparent";
            } else {
                document.getElementById('form-login').classList.add('hidden');
                document.getElementById('form-register').classList.remove('hidden');
                document.getElementById('btn-tab-register').className = "w-1/2 pb-2 font-bold brand-color-text !border-[#5999FF]";
                document.getElementById('btn-tab-login').className = "w-1/2 pb-2 font-bold text-gray-400 border-b-2 border-transparent";
            }
        }

        async function handleRegister() {
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            const passwordConfirm = document.getElementById('reg-password-confirm').value.trim();
            const birthday = document.getElementById('reg-birth').value;
            const username = document.getElementById('reg-username').value.trim().replace('@','');
            let display_name = document.getElementById('reg-display').value.trim();
            const iconFile = document.getElementById('reg-icon-file').files[0];

            if (!email || !password || !passwordConfirm || !birthday || !username) {
                alert('必須項目が未入力です。'); return;
            }
            if (password !== passwordConfirm) {
                alert('確認用パスワードが一致しません。'); return;
            }
            if (!display_name) display_name = '新参者';

            let icon_url = 'logo.jpg';
            if (iconFile) icon_url = await fileToBase64(iconFile);

            fetch(GAS_API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'register', username, display_name, icon_url, email, password, birthday }) 
            })
            .then(res => res.json())
            .then(res => {
                if (res.success) {
                    alert('Loggiaへようこそ！入居登録が完了しました。');
                    loginSuccess(res.user);
                } else { alert('エラー: ' + res.error); }
            });
        }

        function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();
            if (!email || !password) return;

            fetch(GAS_API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'login', email, password }) 
            })
            .then(res => res.json())
            .then(res => {
                if (res.success) { loginSuccess(res.user); }
                else { alert('ログイン失敗: ' + res.error); }
            });
        }

        function loginSuccess(user) {
            currentUser = user;
            localStorage.setItem('loggia_user', JSON.stringify(user));
            document.getElementById('auth-gate').classList.add('hidden');
            updateUserUI();
            loadTimeline(false);
            startAutoRefresh();
        }

        function handleLogout() {
            if(autoRefreshInterval) clearInterval(autoRefreshInterval);
            localStorage.removeItem('loggia_user');
            location.reload();
        }

        function getAvatarHtml(url, cssClass = "w-10 h-10 rounded-full object-cover") {
            if (!url || url === 'logo.jpg') {
                return `<img src="logo.jpg" class="${cssClass} bg-[#000000]" onerror="this.src='https://placehold.co/100x100/000000/ffffff?text=L'">`;
            }
            return `<img src="${url}" class="${cssClass}">`;
        }

        function updateUserUI() {
            if (!currentUser) return;
            document.getElementById('nav-avatar-container').innerHTML = getAvatarHtml(currentUser.icon_url);
            document.getElementById('form-avatar-container').innerHTML = getAvatarHtml(currentUser.icon_url, "w-12 h-12 rounded-full object-cover");
            document.getElementById('nav-display-name').innerText = currentUser.display_name || '住人';
            document.getElementById('nav-username').innerText = '@' + currentUser.username;
        }

        function switchTab(tabName) {
            if (tabName === 'timeline') {
                document.getElementById('tab-timeline').classList.remove('hidden');
                document.getElementById('tab-profile-edit').classList.add('hidden');
                loadTimeline(false);
            } else {
                document.getElementById('tab-timeline').classList.add('hidden');
                document.getElementById('tab-profile-edit').classList.remove('hidden');
                document.getElementById('edit-display-name').value = currentUser.display_name || '';
                document.getElementById('edit-bio').value = currentUser.bio || '';
                const preview = document.getElementById('edit-preview');
                if (currentUser.icon_url) {
                    preview.src = currentUser.icon_url;
                    preview.classList.remove('hidden');
                }
            }
        }

        function renderTimeline(posts) {
            const container = document.getElementById('timeline-posts');
            container.innerHTML = '';
            if (!posts || posts.length === 0) {
                container.innerHTML = '<div class="p-8 text-center text-gray-500">居間にはまだ誰もいないようです。</div>';
                return;
            }
            posts.forEach(post => {
                const avatarHtml = getAvatarHtml(post.icon_url, "w-12 h-12 rounded-full object-cover flex-shrink-0");
                const hasLiked = post.isLiked === true;
                const formattedMessage = linkify(post.message || '');

                const postHtml = `
                    <div class="p-4 twitter-hover flex space-x-3 transition">
                        ${avatarHtml}
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center space-x-2 text-sm">
                                <span class="font-bold text-white truncate">${post.display_name}</span>
                                <span class="text-gray-400 truncate">@${post.username}</span>
                                <span class="text-gray-500">·</span>
                                <span class="text-gray-500 text-xs">${post.timestamp}</span>
                            </div>
                            <div class="text-white mt-1 break-words whitespace-pre-wrap text-[15px]">${formattedMessage}</div>
                            
                            <div class="flex justify-between max-w-md mt-3 text-gray-500 text-sm">
                                <button onclick="alert('コメント機能は開発中です')" class="hover:text-[#5999FF] transition cursor-pointer">
                                    <i class="far fa-comment mr-1"></i><span>0</span>
                                </button>
                                <button onclick="alert('リポスト機能は開発中です')" class="hover:text-green-500 transition cursor-pointer">
                                    <i class="fas fa-retweet mr-1"></i><span>0</span>
                                </button>
                                <button onclick="toggleLike('${post.id}', this)" class="hover:text-pink-500 transition cursor-pointer ${hasLiked ? 'text-pink-500' : ''}" data-liked="${hasLiked}">
                                    <i class="${hasLiked ? 'fas' : 'far'} fa-heart mr-1"></i><span>${post.likes || 0}</span>
                                </button>
                                <div class="text-gray-600 flex items-center select-none">
                                    <i class="far fa-chart-bar mr-1"></i><span>${post.views || 0}</span>
                                </div>
                            </div>
                        </div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', postHtml);
            });
        }

        function submitPost() {
            const textarea = document.getElementById('post-message');
            const message = textarea.value.trim();
            if (!message) return;

            fetch(GAS_API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'createPost', username: currentUser.username, message: message }) 
            })
            .then(res => res.json())
            .then(res => {
                if (res.success) {
                    textarea.value = '';
                    document.getElementById('char-count').innerText = "0 / 140";
                    loadTimeline(false); // 🛠️ 投稿直後は明示的に閲覧数を+1して最新化
                }
            });
        }

        function toggleLike(postId, buttonEl) {
            const heartIcon = buttonEl.querySelector('i');
            const countSpan = buttonEl.querySelector('span');
            buttonEl.style.pointerEvents = 'none';

            fetch(GAS_API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'toggleLike', postId: postId, username: currentUser.username }) 
            })
            .then(res => res.json())
            .then(res => {
                buttonEl.style.pointerEvents = 'auto';
                if (res.success) {
                    buttonEl.setAttribute('data-liked', String(res.isLiked));
                    countSpan.innerText = res.likesCount;
                    if (res.isLiked) {
                        heartIcon.className = 'fas fa-heart text-pink-500 mr-1';
                        buttonEl.classList.add('text-pink-500');
                    } else {
                        heartIcon.className = 'far fa-heart mr-1';
                        buttonEl.classList.remove('text-pink-500');
                    }
                }
            })
            .catch(() => { buttonEl.style.pointerEvents = 'auto'; });
        }

        async function saveProfile() {
            const displayName = document.getElementById('edit-display-name').value.trim();
            const bio = document.getElementById('edit-bio').value.trim();
            const iconFile = document.getElementById('edit-icon-file').files[0];

            let iconUrl = currentUser.icon_url;
            if (iconFile) iconUrl = await fileToBase64(iconFile);

            fetch(GAS_API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'updateProfile', username: currentUser.username, display_name: displayName, icon_url: iconUrl, bio: bio }) 
            })
            .then(res => res.json())
            .then(res => {
                if (res.success) {
                    currentUser.display_name = displayName || '新参者';
                    currentUser.icon_url = iconUrl;
                    currentUser.bio = bio;
                    localStorage.setItem('loggia_user', JSON.stringify(currentUser));
                    updateUserUI();
                    alert('模様替えが完了しました！');
                    switchTab('timeline');
                }
            });
        }
